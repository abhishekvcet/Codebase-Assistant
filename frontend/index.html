<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Intelligent Codebase Assistant — AI-powered code understanding, debugging, and documentation">
    <title>CodeAssist AI</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <div class="logo-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                        <path d="M2 17l10 5 10-5"/>
                        <path d="M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <span class="logo-text">CodeAssist AI</span>
            </div>
            <button class="new-chat-btn" id="newChatBtn" title="New Chat">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 5v14M5 12h14"/>
                </svg>
                <span>New Chat</span>
            </button>
        </div>

        <div class="sidebar-history" id="chatHistory">
            <!-- Chat history items will be rendered here -->
        </div>

        <div class="sidebar-footer">
            <div class="provider-status" id="providerStatus">
                <div class="status-dot" id="statusDot"></div>
                <span class="status-text" id="statusText">Checking...</span>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Header -->
        <header class="chat-header">
            <button class="sidebar-toggle" id="sidebarToggle">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 12h18M3 6h18M3 18h18"/>
                </svg>
            </button>
            <div class="header-title">
                <h1 id="chatTitle">CodeAssist AI</h1>
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="themeToggle" title="Toggle Theme">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"/>
                        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Chat Messages -->
        <div class="chat-container" id="chatContainer">
            <div class="chat-messages" id="chatMessages">
                <!-- Empty state -->
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                            <path d="M2 17l10 5 10-5"/>
                            <path d="M2 12l10 5 10-5"/>
                        </svg>
                    </div>
                    <h2>Welcome Back Buddy!</h2>
                    <p>Ask me anything about your codebase — architecture, debugging, dependencies, or documentation.</p>
                    <div class="suggestion-chips">
                        <button class="chip" data-query="Explain the architecture of this project">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/></svg>
                            Explain architecture
                        </button>
                        <button class="chip" data-query="Find and fix potential bugs in the codebase">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
                            Find bugs
                        </button>
                        <button class="chip" data-query="Generate documentation for the main modules">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
                            Generate docs
                        </button>
                        <button class="chip" data-query="Show dependency graph for this module">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="18" r="3"/><path d="M6 9v6M9 6h6l3 12"/></svg>
                            Show dependencies
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="input-container">
                <div class="model-selector-wrapper">
                    <select id="modelSelector" class="model-selector" title="Select AI Model">
                        <option value="auto">🤖 Auto</option>
                        <option value="local">🏠 Local (Ollama)</option>
                        <option value="groq">⚡ Groq</option>
                        <option value="gemini">💎 Gemini</option>
                    </select>
                </div>
                <div class="input-field-wrapper">
                    <textarea
                        id="messageInput"
                        class="message-input"
                        placeholder="Ask about your codebase..."
                        rows="1"
                        autocomplete="off"
                    ></textarea>
                </div>
                <button class="send-btn" id="sendBtn" title="Send Message" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13"/>
                        <path d="M22 2L15 22l-4-9-9-4z"/>
                    </svg>
                </button>
            </div>
            <div class="input-footer">
                <span class="model-hint" id="modelHint">Auto mode — AI picks the best model for your query</span>
            </div>
        </div>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>

# ── Infrastructure Services ─────────────────────────────────────
# NOTE: Ollama runs locally on the host, NOT in Docker.
# This compose file is for supporting infrastructure only.

version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: codeassist-postgres
    environment:
      POSTGRES_USER: codeassist
      POSTGRES_PASSWORD: codeassist
      POSTGRES_DB: codeassist
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeassist"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Neo4j ───────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: codeassist-neo4j
    environment:
      NEO4J_AUTH: neo4j/codeassist
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt protocol
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p codeassist 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: codeassist-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  neo4j_data:
  redis_data:
